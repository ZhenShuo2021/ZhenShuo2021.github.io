<script>
    document.addEventListener("DOMContentLoaded", function () {
        document.querySelectorAll("pre").forEach(pre => {
            if (!pre.querySelector(".copy-button")) {
                const button = document.createElement("button");
                button.classList.add("copy-button");
                button.innerHTML = ` <svg aria-hidden="true" viewBox="0 0 24 24" class="octicon octicon-copy" > <path fill="currentColor" d="M19,21H8V7H19M19,5H8A2,2 0 0,0 6,7V21A2,2 0 0,0 8,23H19A2,2 0 0,0 21,21V7A2,2 0 0,0 19,5M16,1H4A2,2 0 0,0 2,3V17H4V3H16V1Z"></path> </svg> <svg class="check-icon" viewBox="0 0 24 24" > <path fill="green" d="M21,7L9,19L3.5,13.5L4.91,12.09L9,16.17L19.59,5.59L21,7Z"></path> </svg> `;
                pre.appendChild(button);

                button.addEventListener("click", function () {
                    const code = pre.querySelector("code").textContent;

                    navigator.clipboard.writeText(code).then(function () {
                        const copyIcon = button.querySelector(".octicon-copy");
                        const checkIcon = button.querySelector(".check-icon");

                        copyIcon.style.display = "none";
                        checkIcon.style.display = "block";

                        setTimeout(function () {
                            copyIcon.style.display = "block";
                            checkIcon.style.display = "none";
                        }, 2000);
                    });
                });
            }
        });
    });
</script>

<style>
    pre {
        position: relative;
        overflow: auto;
        padding: 16px;
        background-color: #f5f5f5;
        border-radius: 6px;
        font-size: 14px;
        line-height: 1.5;
        white-space: pre;
        word-wrap: normal;
        max-width: 100%;
        min-width: 300px;
        box-sizing: border-box;
    }

    .copy-button {
        display: inline-block;
        background-color: transparent !important;
        color: #2f363d;
        border: none;
        padding: 0;
        font-size: 16px;
        z-index: 9999999;
        cursor: pointer;
        visibility: visible;
        position: absolute;
        /* 讓按鈕固定在 pre 內部 */
        top: 8px;
        right: 12px;
        width: 28px;
        height: 28px;
        border-radius: 6px;
        overflow: hidden;
    }

    .copy-button svg {
        position: absolute;
        top: 50%;
        left: 50%;
        width: 18px;
        height: 18px;
        transform: translate(-50%, -50%);
        fill: #4d4d4d;
    }

    .dark .copy-button svg {
        fill: #c8c8c8;
    }

    .copy-button:hover {
        background-color: #d1d5da !important;
        border-radius: 6px;
    }

    .copy-button:active {
        background-color: #b0b6b9 !important;
    }

    .dark .copy-button:hover {
        background-color: #444c56 !important;
    }

    .check-icon {
        width: 18px;
        height: 18px;
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        fill: green;
        display: none;
    }
</style>
